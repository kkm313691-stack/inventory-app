<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
.card {
    border:1px solid #ddd;
    padding:10px;
    margin:10px;
}
.red {
    color:red;
}
</style>
</head>

<body>

<h2>재고 조사</h2>

<div id="list"></div>

<button onclick="saveData()">저장</button>
<button onclick="download()">엑셀 다운로드</button>

<script>
let data = {{ data | tojson }};

function render(){
    let html = '';

    data.forEach((item, i) => {
        html += `
        <div class="card">
            <b>${item['랙번호']}</b><br>
            품명: ${item['품명']}<br>
            소비기한: ${item['소비기한']}<br>
            전산수량: ${item['전산수량']}<br>

            실수량:
            <input type="number" onchange="update(${i}, this.value)">
            
            <div id="diff-${i}">차이: </div>
        </div>
        `;
    });

    document.getElementById('list').innerHTML = html;
}

function update(i, value){
    let real = parseInt(value || 0);
    let stock = data[i]['전산수량'];

    let diff = real - stock;

    data[i]['실수량'] = real;
    data[i]['차이'] = diff;

    let el = document.getElementById(`diff-${i}`);
    el.innerText = '차이: ' + diff;

    if(diff !== 0){
        el.classList.add('red');
    }else{
        el.classList.remove('red');
    }
}

function saveData(){
    fetch('/save', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(data)
    })
    .then(()=>alert('저장 완료'));
}

function download(){
    window.location = '/download';
}

render();
</script>

</body>
</html>
