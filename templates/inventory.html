<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-size: 20px;
}
.card {
    border:1px solid #ddd;
    padding:20px;
    margin:10px;
}
button {
    font-size: 20px;
    padding: 10px;
    margin:5px;
}
input {
    font-size: 20px;
    padding: 5px;
    width: 100%;
}
</style>
</head>

<body>

<h2>재고 조사</h2>

<div id="list"></div>

<button onclick="downloadExcel()">엑셀 다운로드</button>

<script>

let data = {{ data | tojson }};
let currentIndex = 0;


// 화면 표시
function render(){
    let item = data[currentIndex];

    let html = `
    <div class="card">

        <h3>${currentIndex + 1} / ${data.length}</h3>

        <b>${item['로케이션']}</b><br>
        상품명: ${item['상품명'] || ''}<br>
        소비기한: ${item['소비기한'] || ''}<br>
        재고수량: ${item['재고수량']}<br><br>

        실수량:
        <input type="number" id="realInput" 
            value="${item['실수량'] || ''}"
            onchange="updateValue(this.value)">
        
        <div id="diff">차이: ${item['차이'] || 0}</div>

        <br>
        <button onclick="prev()">이전</button>
        <button onclick="next()">다음</button>

    </div>
    `;

    document.getElementById('list').innerHTML = html;

    // 입력창 자동 포커스
    setTimeout(() => {
        document.getElementById('realInput').focus();
    }, 100);
}


// 값 입력 시 계산
function updateValue(value){
    let real = parseInt(value || 0);
    let stock = parseInt(data[currentIndex]['재고수량'] || 0);

    let diff = real - stock;

    data[currentIndex]['실수량'] = real;
    data[currentIndex]['차이'] = diff;

    let el = document.getElementById('diff');
    el.innerText = '차이: ' + diff;

    if(diff !== 0){
        el.style.color = 'red';
    }else{
        el.style.color = 'black';
    }
}


// 다음
function next(){
    if(data[currentIndex]['실수량'] === '' || data[currentIndex]['실수량'] === null){
        alert('실수량 입력하세요');
        return;
    }

    if(currentIndex < data.length - 1){
        currentIndex++;
        render();
    }else{
        alert('마지막입니다');
    }
}


// 이전
function prev(){
    if(currentIndex > 0){
        currentIndex--;
        render();
    }else{
        alert('처음입니다');
    }
}


// 엔터 → 다음 이동 (PDA 최적화)
document.addEventListener('keydown', function(e){
    if(e.key === 'Enter'){
        next();
    }
});


// 🔥 엑셀 다운로드 (POST 방식)
function downloadExcel(){
    fetch('/download', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
    })
    .then(response => {
        if(!response.ok){
            throw new Error('서버 오류');
        }
        return response.blob();
    })
    .then(blob => {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = '재고조사결과.xlsx';
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);
    })
    .catch(error => {
        alert('다운로드 실패: ' + error);
    });
}


// 시작
render();

</script>

</body>
</html>
