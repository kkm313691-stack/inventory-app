<script>

let data = {{ data | tojson }};

// 🔥 이어하기 시작 위치
let currentIndex = data.findIndex(x =>
    x['실수량'] === null ||
    x['실수량'] === '' ||
    x['실수량'] === undefined
);

if(currentIndex === -1){
    currentIndex = data.length - 1;
    alert('이미 모든 재고조사가 완료되었습니다');
}


// ===== 다음 이동 (스킵 기능) =====
function next(){

    let nextIndex = data.findIndex((x, i) =>
        i > currentIndex &&
        (x['실수량'] === null || x['실수량'] === '')
    );

    if(nextIndex !== -1){
        currentIndex = nextIndex;
    } else {
        currentIndex++;
    }

    if(currentIndex < data.length){
        render();
    } else {
        alert('모든 재고조사 완료');
    }
}

</script>
