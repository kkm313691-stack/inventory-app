<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-size:18px; padding:10px; background:#f5f5f5; }
.card { background:#fff; padding:20px; border-radius:10px; margin:10px 0; }
input { width:100%; font-size:20px; padding:10px; margin:5px 0; }
button { width:100%; padding:14px; margin:5px 0; font-size:18px; }
.next-btn { background:#4CAF50; color:white; }
.btn-row { display:flex; gap:8px; }
.btn-row button { flex:1; }
</style>
</head>

<body>

<h2>재고조사</h2>

<input id="barcodeInput" placeholder="📷 바코드 스캔" autofocus>

<button onclick="downloadExcel()">다운로드</button>

<div id="list"></div>

<script>

let data = {{ data | tojson }};
let currentIndex = 0;


// ===== 바코드 스캔 =====
document.getElementById('barcodeInput')
.addEventListener('keypress', function(e){
    if(e.key === 'Enter'){
        searchBarcode(e.target.value.trim());
        e.target.value = '';
    }
});

function searchBarcode(code){

    let index = data.findIndex(x => String(x['바코드']) === code);

    if(index === -1){
        alert("상품 없음");
        return;
    }

    currentIndex = index;
    render();
}


// ===== 렌더 =====
function render(){

    let item = data[currentIndex];

    document.getElementById('list').innerHTML = `
    <div class="card">
        ${currentIndex+1} / ${data.length}<br><br>

        ${item['로케이션'] ? `로케이션: ${item['로케이션']}<br>` : ''}
        상품명: ${item['상품명']}<br>
        ${item['소비기한'] ? `소비기한: ${item['소비기한']}<br>` : ''}

        <br>

        재고수량: ${item['재고수량']}<br><br>

        박스수:
        <input id="boxQty" type="tel" value="${item['박스수'] || ''}">

        낱개수량:
        <input id="eachQty" type="tel" value="${item['낱개수량'] || ''}">

        <br>

        <div>차이: ${item['차이']}</div>

        <div class="btn-row">
            <button onclick="prev()">이전</button>
            <button onclick="same()">동일</button>
            <button class="next-btn" onclick="saveAndNext()">다음</button>
        </div>
    </div>
    `;

    setTimeout(()=>{
        document.getElementById('boxQty').focus();
    },50);
}


// ===== 저장 =====
function saveValues(){

    let item = data[currentIndex];

    let box = parseInt(document.getElementById('boxQty').value) || 0;
    let each = parseInt(document.getElementById('eachQty').value) || 0;

    item['박스수'] = box;
    item['낱개수량'] = each;

    let total = box + each;

    item['실수량'] = total;
    item['차이'] = total - item['재고수량'];
}


// ===== 이동 =====
function saveAndNext(){
    saveValues();
    currentIndex++;
    if(currentIndex < data.length){
        render();
    }
}

function prev(){
    if(currentIndex > 0){
        currentIndex--;
        render();
    }
}

function same(){
    let item = data[currentIndex];
    item['박스수'] = item['재고수량'];
    item['낱개수량'] = 0;
    item['실수량'] = item['재고수량'];
    item['차이'] = 0;
    saveAndNext();
}


// ===== 다운로드 =====
function downloadExcel(){
    fetch('/download',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(data)
    })
    .then(r=>r.blob())
    .then(b=>{
        let a=document.createElement('a');
        a.href=URL.createObjectURL(b);
        a.download='재고조사.xlsx';
        a.click();
    });
}

render();

</script>

</body>
</html>
