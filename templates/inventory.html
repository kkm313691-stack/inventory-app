<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-size:18px; padding:10px; background:#f5f5f5; }
.card { background:#fff; padding:20px; border-radius:12px; margin:10px 0; }
input, button {
    width:100%;
    padding:16px;
    margin:6px 0;
    font-size:20px;
    border-radius:8px;
    box-sizing:border-box;
}
button { background:#4CAF50; color:white; border:none; }
</style>
</head>

<body>

<h2>📦 재고조사</h2>

<input id="barcodeInput" placeholder="📷 바코드 스캔">

<button onclick="downloadExcel()">엑셀 다운로드</button>
<button onclick="shareLink()">공유 링크 생성</button>

<div id="list"></div>

<script>

let data = {{ data | tojson }};
let currentItem = null;

function syncServer(){
    fetch('/sync',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(data)
    });
}

document.getElementById('barcodeInput')
.addEventListener('keypress', function(e){
    if(e.key === 'Enter'){
        let code = e.target.value.trim();
        e.target.value = '';

        let item = data.find(x => String(x['바코드']) === code);

        if(!item){
            alert("상품 없음");
            return;
        }

        currentItem = item;

        document.getElementById('list').innerHTML = `
        <div class="card">
            <h3>${item['상품명']}</h3>
            재고수량: ${item['재고수량']}<br><br>
            박스수:
            <input id="box">
            낱개:
            <input id="each" onkeydown="save(event)">
        </div>
        `;
    }
});

function save(e){
    if(e.key === 'Enter'){

        let box = parseInt(document.getElementById('box').value) || 0;
        let each = parseInt(document.getElementById('each').value) || 0;

        currentItem['실수량'] += (box + each);
        currentItem['차이'] = currentItem['실수량'] - currentItem['재고수량'];

        syncServer();

        document.getElementById('barcodeInput').focus();
    }
}

function downloadExcel(){
    fetch('/download',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(data)
    })
    .then(r=>r.blob())
    .then(b=>{
        let a=document.createElement('a');
        a.href=URL.createObjectURL(b);
        a.download='재고조사.xlsx';
        a.click();
    });
}

function shareLink(){
    fetch('/generate_link',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(data)
    })
    .then(r=>r.json())
    .then(r=>{
        let url = location.origin + r.link;
        navigator.clipboard.writeText(url);
        alert("링크 복사됨\n" + url);
    });
}

</script>

</body>
</html>
