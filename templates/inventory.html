<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-size:18px; padding:10px; background:#f5f5f5; }

.card {
    background:#fff;
    padding:20px;
    border-radius:12px;
    margin:10px 0;
}

input, button {
    width:100%;
    padding:16px;
    margin:6px 0;
    font-size:20px;
    border-radius:8px;
    box-sizing:border-box;
}

button {
    background:#4CAF50;
    color:white;
    border:none;
}
</style>
</head>

<body>

<h2>📦 재고조사</h2>

<input id="barcodeInput"
       placeholder="📷 바코드 스캔"
       inputmode="none"
       autofocus>

<button onclick="downloadExcel()">엑셀 다운로드</button>
<button onclick="shareLink()">공유 링크 생성</button>

<div id="list"></div>

<script>

let data = {{ data | tojson }};
let currentItem = null;


// =========================
// 🔥 포커스 유지
// =========================
function focusBarcode(){
    setTimeout(()=>{
        let el = document.getElementById('barcodeInput');
        if(el) el.focus();
    },100);
}


// =========================
// 🔥 서버 동기화
// =========================
function syncServer(){
    fetch('/sync',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(data)
    });
}


// =========================
// 🔥 바코드 스캔 (핵심)
// =========================
document.getElementById('barcodeInput')
.addEventListener('keydown', function(e){

    if(e.key === 'Enter'){

        let code = e.target.value.trim();
        e.target.value = '';

        console.log("스캔값:", code);

        let item = data.find(x => String(x['바코드']) === code);

        if(!item){
            alert("상품 없음");
            focusBarcode();
            return;
        }

        currentItem = item;
        render();

        // 입력칸으로 이동
        setTimeout(()=>{
            let box = document.getElementById('box');
            if(box) box.focus();
        },100);
    }
});


// =========================
// 🔥 UI 렌더
// =========================
function render(){

    document.getElementById('list').innerHTML = `
    <div class="card">

        ${currentItem['로케이션'] ? `📍 ${currentItem['로케이션']}<br>` : ''}
        <h3>${currentItem['상품명']}</h3>
        ${currentItem['소비기한'] ? `⏰ ${currentItem['소비기한']}<br>` : ''}

        재고수량: ${currentItem['재고수량']}<br><br>

        박스수:
        <input id="box" type="tel">

        낱개수량:
        <input id="each" type="tel" onkeydown="save(event)">

        <div id="msg"></div>

    </div>
    `;
}


// =========================
// 🔥 저장
// =========================
function save(e){

    if(e.key === 'Enter'){

        let box = parseInt(document.getElementById('box').value) || 0;
        let each = parseInt(document.getElementById('each').value) || 0;

        currentItem['박스수'] += box;
        currentItem['낱개수량'] += each;

        currentItem['실수량'] += (box + each);
        currentItem['차이'] = currentItem['실수량'] - currentItem['재고수량'];

        syncServer();

        document.getElementById('msg').innerText = "✔ 저장 완료";

        // 초기화
        document.getElementById('box').value = '';
        document.getElementById('each').value = '';

        // 다시 스캔 준비
        focusBarcode();
    }
}


// =========================
// 🔥 다운로드
// =========================
function downloadExcel(){
    fetch('/download',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(data)
    })
    .then(r=>r.blob())
    .then(b=>{
        let a=document.createElement('a');
        a.href=URL.createObjectURL(b);
        a.download='재고조사.xlsx';
        a.click();
    });
}


// =========================
// 🔥 공유
// =========================
function shareLink(){
    fetch('/generate_link',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(data)
    })
    .then(r=>r.json())
    .then(r=>{
        let url = location.origin + r.link;
        navigator.clipboard.writeText(url);
        alert("링크 복사됨\n" + url);
    });
}


// 초기 포커스
focusBarcode();

</script>

</body>
</html>
