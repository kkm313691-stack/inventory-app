<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-size:18px;
    margin:0;
    padding:10px;
    background:#f5f5f5;
}

h2 {
    text-align:center;
}

button {
    font-size:18px;
    padding:14px;
    margin:5px 0;
    width:100%;
}

.card {
    border:1px solid #ddd;
    padding:20px;
    margin:10px 0;
    background:#fff;
    border-radius:10px;
}

.done {
    background:#e8f5e9;
}

.diff-red {
    color:red;
    font-weight:bold;
}

input {
    width:100%;
    font-size:22px;
    padding:12px;
    margin-top:8px;
    margin-bottom:10px;
    box-sizing:border-box;
}
</style>
</head>

<body>

<h2>재고조사</h2>

<button onclick="downloadExcel()">다운로드</button>
<button onclick="shareLink()">공유</button>

<div id="list"></div>

<script>

let data = {{ data | tojson }};
let currentIndex = data.findIndex(x => x['실수량'] == null);
if(currentIndex < 0) currentIndex = 0;


// 🔥 렌더
function render(){

    let item = data[currentIndex];

    let diffClass = item['차이'] != 0 ? 'diff-red' : '';

    document.getElementById('list').innerHTML = `
    <div class="card ${item['실수량']!=null?'done':''}">
        ${currentIndex+1} / ${data.length}<br><br>

        로케이션: ${item['로케이션'] || ''}<br>
        상품명: ${item['상품명']}<br><br>

        재고수량: ${item['재고수량']}<br><br>

        <div>
            실수량 입력:
            <input id="qty"
                value="${item['실수량'] ?? ''}"
                inputmode="numeric"
                placeholder="수량 입력"
                oninput="update(this.value)">
        </div>

        <div class="${diffClass}">
            차이: ${item['차이']}
        </div>

        <br>

        <button onclick="prev()">이전</button>
        <button onclick="same()">동일</button>
        <button onclick="next()">다음</button>
    </div>
    `;

    // 🔥 자동 포커스
    setTimeout(() => {
        let input = document.getElementById('qty');
        if(input) input.focus();
    }, 50);
}


// 🔥 실시간 반영
function update(v){

    let item = data[currentIndex];

    let real = (v === '') ? null : parseInt(v);

    item['실수량'] = isNaN(real) ? null : real;

    item['차이'] = item['실수량'] == null
        ? 0
        : item['실수량'] - item['재고수량'];

    render(); // 핵심
}


// 동일 처리
function same(){
    let item = data[currentIndex];
    item['실수량'] = item['재고수량'];
    item['차이'] = 0;
    next();
}


// 이동
function next(){
    if(currentIndex < data.length-1){
        currentIndex++;
        render();
    }
}

function prev(){
    if(currentIndex > 0){
        currentIndex--;
        render();
    }
}


// 다운로드
function downloadExcel(){
    fetch('/download',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(data)
    })
    .then(r=>r.blob())
    .then(b=>{
        let a=document.createElement('a');
        a.href=URL.createObjectURL(b);
        a.download='result.xlsx';
        a.click();
    });
}


// 링크 공유
function shareLink(){
    fetch('/generate_link',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(data)
    })
    .then(r=>r.json())
    .then(r=>{
        let url=location.origin+r.link;
        navigator.clipboard.writeText(url);
        alert("링크 복사됨:\n"+url);
    });
}


// 초기 실행
render();

</script>

</body>
</html>
