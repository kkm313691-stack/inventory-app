<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-size:20px; }
.card { border:1px solid #ddd; padding:20px; margin:10px; }
button { font-size:20px; padding:10px; margin:5px; }
input { font-size:20px; padding:5px; width:100%; }
</style>
</head>

<body>

<h2>재고 조사</h2>

<div id="list"></div>

<button onclick="downloadExcel()">엑셀 다운로드</button>

<script>

let data = {{ data | tojson }};
let currentIndex = 0;


// 🔥 안전하게 값 가져오는 함수 (핵심)
function getValue(item, keys, defaultVal=''){
    for(let k of keys){
        if(item[k] !== undefined && item[k] !== null){
            return item[k];
        }
    }
    return defaultVal;
}


// 화면 표시
function render(){
    let item = data[currentIndex];

    let location = getValue(item, ['로케이션','랙번호','위치']);
    let name = getValue(item, ['상품명','품명']);
    let stock = getValue(item, ['재고수량','전산수량'], 0);
    let exp = getValue(item, ['소비기한']);

    let html = `
    <div class="card">

        <h3>${currentIndex + 1} / ${data.length}</h3>

        <b>${location}</b><br>
        상품명: ${name}<br>
        소비기한: ${exp}<br>
        재고수량: ${stock}<br><br>

        실수량:
        <input type="number" id="realInput" 
            value="${item['실수량'] || ''}"
            onchange="updateValue(this.value)">
        
        <div id="diff">차이: ${item['차이'] || 0}</div>

        <br>
        <button onclick="prev()">이전</button>
        <button onclick="next()">다음</button>

    </div>
    `;

    document.getElementById('list').innerHTML = html;

    setTimeout(() => {
        document.getElementById('realInput').focus();
    }, 100);
}


// 값 입력
function updateValue(value){
    let item = data[currentIndex];

    let stock = parseInt(
        getValue(item, ['재고수량','전산수량'], 0)
    );

    let real = parseInt(value || 0);
    let diff = real - stock;

    item['실수량'] = real;
    item['차이'] = diff;

    let el = document.getElementById('diff');
    el.innerText = '차이: ' + diff;

    el.style.color = diff !== 0 ? 'red' : 'black';
}


// 다음
function next(){
    if(data[currentIndex]['실수량'] === '' || data[currentIndex]['실수량'] === null){
        alert('실수량 입력하세요');
        return;
    }

    if(currentIndex < data.length - 1){
        currentIndex++;
        render();
    }else{
        alert('마지막입니다');
    }
}


// 이전
function prev(){
    if(currentIndex > 0){
        currentIndex--;
        render();
    }else{
        alert('처음입니다');
    }
}


// 엔터 이동
document.addEventListener('keydown', function(e){
    if(e.key === 'Enter'){
        next();
    }
});


// 다운로드
function downloadExcel(){
    fetch('/download', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(data)
    })
    .then(res => res.blob())
    .then(blob => {
        let url = window.URL.createObjectURL(blob);
        let a = document.createElement('a');
        a.href = url;
        a.download = '재고조사결과.xlsx';
        a.click();
    });
}


// 시작
render();

</script>

</body>
</html>
