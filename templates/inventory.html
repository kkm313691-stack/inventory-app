<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { font-size:20px; }
.card { border:1px solid #ddd; padding:20px; margin:10px; }
.done { background:#e8f5e9; }
</style>
</head>

<body>

<h2>재고조사</h2>

<button onclick="downloadExcel()">다운로드</button>
<button onclick="shareLink()">공유</button>

<div id="list"></div>

<script>

let data = {{ data | tojson }};
let mode = "{{ mode }}";

let productMap = {};
data.forEach(i => productMap[i['상품코드']] = i);

let currentIndex = data.findIndex(x => x['실수량'] == null);
if(currentIndex < 0) currentIndex = 0;


// ===== 공통 =====
function cleanNumber(v){
    return parseInt(v || 0) || 0;
}


// ===== 모드 분기 =====
function render(){
    if(mode === 'scan') renderScan();
    else renderLocation();
}


// ===== 로케이션 =====
function renderLocation(){

    let item = data[currentIndex];

    document.getElementById('list').innerHTML = `
    <div class="card ${item['실수량']!=null?'done':''}">
        ${currentIndex+1}/${data.length}<br>
        ${item['로케이션']||''}<br>
        ${item['상품명']}<br>
        재고:${item['재고수량']}<br>

        <input id="qty" value="${item['실수량']||''}"
        oninput="update(this.value)">

        <div>차이:${item['차이']}</div>

        <button onclick="prev()">이전</button>
        <button onclick="next()">다음</button>
        <button onclick="same()">동일</button>
    </div>
    `;
}

function update(v){
    let item = data[currentIndex];
    let real = v ? parseInt(v) : null;
    item['실수량'] = real;
    item['차이'] = real==null?0:real-item['재고수량'];
}

function same(){
    let item = data[currentIndex];
    item['실수량'] = item['재고수량'];
    item['차이'] = 0;
    next();
}

function next(){
    if(currentIndex < data.length-1){
        currentIndex++;
        render();
    }
}

function prev(){
    if(currentIndex>0){
        currentIndex--;
        render();
    }
}


// ===== 바코드 =====
let currentItem=null;

function renderScan(){
    document.getElementById('list').innerHTML = `
    <div class="card">

    바코드:<input id="barcode" onkeydown="scan(event)"><br>
    상품:<div id="name"></div><br>

    박스:<input id="box"><br>
    낱개:<input id="each"><br>
    소비기한:<input type="date" id="exp"><br>

    <button onclick="saveScan()">저장</button>

    </div>
    `;
}

function scan(e){
    if(e.key==='Enter'){
        let code = e.target.value;
        let item = productMap[code];
        if(!item) return alert('없음');

        currentItem = item;
        document.getElementById('name').innerText = item['상품명'];
    }
}

function saveScan(){

    if(!currentItem) return alert('스캔');

    let box = parseInt(box.value)||0;
    let each = parseInt(each.value)||0;
    let unit = currentItem['입수']||1;

    let qty = box*unit + each;

    data.push({
        '상품명': currentItem['상품명'],
        '상품코드': currentItem['상품코드'],
        '재고수량':0,
        '실수량':qty,
        '차이':qty,
        '소비기한': exp.value
    });

    barcode.value='';
    name.innerText='';
    box.value='';
    each.value='';
    exp.value='';
    currentItem=null;
}


// ===== 공통 기능 =====
function downloadExcel(){
    fetch('/download',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(data)
    })
    .then(r=>r.blob())
    .then(b=>{
        let a=document.createElement('a');
        a.href=URL.createObjectURL(b);
        a.download='result.xlsx';
        a.click();
    });
}

function shareLink(){
    fetch('/generate_link',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(data)
    })
    .then(r=>r.json())
    .then(r=>{
        let url=location.origin+r.link;
        navigator.clipboard.writeText(url);
        alert(url);
    });
}

render();

</script>
</body>
</html>
