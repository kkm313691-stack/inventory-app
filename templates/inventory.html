<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-size:18px; padding:10px; background:#f5f5f5; }

.card {
    background:#fff;
    padding:20px;
    border-radius:12px;
    margin:10px 0;
}

input, button {
    width:100%;
    padding:16px;
    margin:6px 0;
    font-size:20px;
    border-radius:8px;
    box-sizing:border-box;
}

button {
    background:#4CAF50;
    color:white;
    border:none;
}
</style>
</head>

<body>

<h2>📦 재고조사</h2>

<input id="barcodeInput" placeholder="📷 바코드 스캔" autofocus>

<label>
<input type="checkbox" id="autoMode"> 스캔만으로 +1
</label>

<button onclick="showMissing()">미입력 보기</button>

<div id="list"></div>

<script>

let data = {{ data | tojson }};
let currentItem = null;


// ===== 서버 동기화 =====
function syncServer(){
    fetch('/sync',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(data)
    });
}


// ===== 스캔 =====
document.getElementById('barcodeInput')
.addEventListener('keypress', function(e){
    if(e.key === 'Enter'){
        scan(e.target.value.trim());
        e.target.value = '';
    }
});

function scan(code){

    let item = data.find(x => String(x['바코드']) === code);

    if(!item){
        alert("상품 없음");
        return;
    }

    let auto = document.getElementById('autoMode').checked;

    if(auto){
        item['실수량'] += 1;
        item['차이'] = item['실수량'] - item['재고수량'];
        syncServer();
        return;
    }

    currentItem = item;
    render();
}


// ===== 렌더 =====
function render(){

    document.getElementById('list').innerHTML = `
    <div class="card">

        ${currentItem['로케이션'] ? `📍 ${currentItem['로케이션']}<br>` : ''}
        <h3>${currentItem['상품명']}</h3>
        ${currentItem['소비기한'] ? `⏰ ${currentItem['소비기한']}<br>` : ''}

        재고수량: ${currentItem['재고수량']}<br><br>

        박스수:
        <input id="boxQty" type="tel">

        낱개수량:
        <input id="eachQty" type="tel" onkeydown="handleEnter(event)">

        <div id="result"></div>

    </div>
    `;
}


// ===== 저장 =====
function handleEnter(e){
    if(e.key === 'Enter'){
        save();
    }
}

function save(){

    let box = parseInt(document.getElementById('boxQty').value) || 0;
    let each = parseInt(document.getElementById('eachQty').value) || 0;

    currentItem['박스수'] += box;
    currentItem['낱개수량'] += each;

    currentItem['실수량'] += (box + each);
    currentItem['차이'] = currentItem['실수량'] - currentItem['재고수량'];

    syncServer();

    document.getElementById('result').innerText = "✔ 저장됨";

    document.getElementById('boxQty').value = '';
    document.getElementById('eachQty').value = '';

    document.getElementById('barcodeInput').focus();
}


// ===== 미입력 보기 =====
function showMissing(){

    let missing = data.filter(x => x['실수량'] === 0);

    if(missing.length === 0){
        alert("모두 입력 완료");
        return;
    }

    let list = missing.map(x => x['상품명']).join("\\n");

    alert("미입력:\\n" + list);
}

</script>

</body>
</html>
