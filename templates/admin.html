<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { padding:10px; font-size:18px; background:#f5f5f5; }
button { width:100%; padding:16px; margin:5px 0; font-size:18px; }
.card { background:#fff; padding:15px; margin:5px 0; }
</style>
</head>

<body>

<h2>🛠 관리자 페이지</h2>

<button onclick="loadData()">새로고침</button>
<button onclick="downloadAndReset()">다운로드 + 초기화</button>

<div id="list"></div>

<script>

function loadData(){
    fetch('/current_data')
    .then(r=>r.json())
    .then(data=>{

        let html = data.map(d => `
        <div class="card">
            ${d['상품명']} - ${d['실수량'] || 0}
        </div>
        `).join('');

        document.getElementById('list').innerHTML = html;
    });
}

function downloadAndReset(){

    fetch('/admin_download', { method:'POST' })
    .then(r=>r.blob())
    .then(b=>{
        let a=document.createElement('a');
        a.href=URL.createObjectURL(b);
        a.download='최종.xlsx';
        a.click();

        loadData(); // 초기화 확인
    });
}

loadData();

</script>

</body>
</html>
